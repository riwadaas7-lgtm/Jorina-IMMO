<h2 class="mb-4">🏢 Departments</h2>

<!-- 🔵 FORM -->
<div class="card p-3 mb-4">

  <div class="row g-2">

    <div class="col-md-3">
      <input class="form-control"
             [(ngModel)]="nom"
             placeholder="Nom">
    </div>

    <div class="col-md-3">
      <input class="form-control"
             [(ngModel)]="ville"
             placeholder="Ville">
    </div>

    <div class="col-md-3">
      <input class="form-control"
             [(ngModel)]="code_postal"
             placeholder="Code postal">
    </div>

    <div class="col-md-3">
      <input class="form-control"
             [(ngModel)]="address"
             placeholder="Address">
    </div>

    <div class="col-md-12 mt-2">
      <button class="btn btn-primary w-100" (click)="add()">
        ➕ Add Department
      </button>
    </div>

  </div>

</div>

---

<!-- 🔥 LIST -->
<div class="row">

  <div class="col-md-4 mb-3" *ngFor="let d of departments">

    <div class="card p-3 shadow-sm">

      <h5>{{ d.nom }}</h5>

      <p class="mb-1">📍 {{ d.ville }}</p>
      <p class="mb-1">📮 {{ d.code_postal }}</p>
      <p class="mb-2">🏠 {{ d.address }}</p>

      <div class="d-flex justify-content-between">

        <button class="btn btn-sm btn-warning"
                (click)="startEdit(d)">
          ✏️
        </button>

        <button class="btn btn-sm btn-danger"
                (click)="delete(d.id)">
          🗑️
        </button>

      </div>

    </div>

  </div>

</div>
