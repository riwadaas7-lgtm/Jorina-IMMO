<div class="page">

  <h2 class="page-title">Mes Factures</h2>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab" [class.active]="activeTab==='toutes'"
            (click)="activeTab='toutes'">Toutes</button>
    <button class="tab" [class.active]="activeTab==='en_attente'"
            (click)="activeTab='en_attente'">En attente</button>
    <button class="tab" [class.active]="activeTab==='payee'"
            (click)="activeTab='payee'">Payées</button>
    <button class="tab" [class.active]="activeTab==='en_retard'"
            (click)="activeTab='en_retard'">En retard</button>
  </div>

  <!-- FACTURES LIST -->
  <div class="factures-list">

    <div class="facture-row" *ngFor="let f of filtered()">

      <div class="facture-icon-box">
        <span>{{ typeIcon(f.type) }}</span>
      </div>

      <div class="facture-info">
        <span class="facture-type">{{ f.type | titlecase }}</span>
        <span class="facture-date">Date: {{ f.date_facture }}</span>
      </div>

{{ f.montant | number }} Dt

      <div class="facture-status">
        <span class="status-badge" [ngClass]="f.status">{{ statusLabel(f.status) }}</span>
        <span class="status-date">{{ f.date_delai }} <br> <small>{{ f.periode_start }} → {{ f.periode_end }}</small></span>
      </div>

    </div>

  </div>

  <div class="empty" *ngIf="filtered().length === 0">
    Aucune facture trouvée.
  </div>

</div>
