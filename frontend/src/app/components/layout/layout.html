<div class="app-shell">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <span class="logo-icon">🏢</span>
      <span class="logo-text">JORILINA IMMO</span>
    </div>

    <nav class="sidebar-nav">

      <!-- SHARED -->
      <a routerLink="/dashboard"
         routerLinkActive="active"
         class="nav-item">
        <span class="nav-icon">⊞</span>
        <span>Dashboard</span>
      </a>

      <!-- PROPRIÉTAIRE LINKS -->
      <ng-container *ngIf="isOwner">

        <a routerLink="/departments"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">🏢</span>
          <span>Départements</span>
        </a>

        <a routerLink="/apartments"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">🏠</span>
          <span>Appartements</span>
        </a>

        <a routerLink="/users"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">👤</span>
          <span>Locataires</span>
        </a>

        <a routerLink="/contracts"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">📄</span>
          <span>Contrats</span>
        </a>

        <a routerLink="/factures"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">🧾</span>
          <span>Factures</span>
        </a>

        <a routerLink="/payments"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">💳</span>
          <span>Paiements</span>
        </a>

        <a routerLink="/invitations"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">✉️</span>
          <span>Invitations</span>
        </a>

      </ng-container>

      <!-- LOCATAIRE LINKS -->
      <ng-container *ngIf="isLocataire">

        <a routerLink="/my-apartment"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">🏠</span>
          <span>Mon Appartement</span>
        </a>

        <a routerLink="/my-contract"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">📄</span>
          <span>Mon Contrat</span>
        </a>

        <a routerLink="/my-factures"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">🧾</span>
          <span>Mes Factures</span>
        </a>

        <a routerLink="/my-payments"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">💳</span>
          <span>Mes Paiements</span>
        </a>

        <a routerLink="/notifications"
           routerLinkActive="active"
           class="nav-item">
          <span class="nav-icon">🔔</span>
          <span>Notifications</span>
        </a>

      </ng-container>

    </nav>

    <button class="logout-btn" (click)="logout()">
      🚪 Déconnexion
    </button>

  </aside>

  <!-- ═══ MAIN ═══ -->
  <div class="main-wrapper">

    <header class="topbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Rechercher..." />
      </div>
      <div class="topbar-right">
        <button class="notif-btn">
          🔔
          <span class="notif-badge">3</span>
        </button>
        <div class="avatar">
          {{ user?.nom?.charAt(0) || 'U' }}
        </div>
      </div>
    </header>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
