<h2 class="mb-4">🏠 Apartments</h2>

<!-- 🔵 FORM -->
<div class="card p-3 mb-4">

  <div class="row g-2">

    <div class="col-md-4">
      <input class="form-control"
             [(ngModel)]="name"
             placeholder="Apartment name">
    </div>

    <div class="col-md-4">
      <select class="form-select" [(ngModel)]="departmentId">
        <option [ngValue]="null">Select department</option>
        <option *ngFor="let d of departments" [ngValue]="d.id">
          {{ d.nom }}
        </option>
      </select>
    </div>

    <div class="col-md-4">
      <button class="btn btn-primary w-100" (click)="add()">
        ➕ Add Apartment
      </button>
    </div>

  </div>

</div>

---

<!-- 🔥 LIST -->
<div class="row">

  <div class="col-md-4 mb-3" *ngFor="let a of apartments">

    <div class="card p-3 shadow-sm">

      <h5>{{ a.nom }}</h5>

      <p class="mb-1">
        💰 {{ a.price }} DT
      </p>

      <p class="mb-1">
        🏢 {{ getDepartmentName(a.department_id) }}
      </p>

      <p>
        📌 
        <span [class.text-success]="a.status === 'libre'"
              [class.text-danger]="a.status !== 'libre'">
          {{ a.status }}
        </span>
      </p>

      <!-- ACTIONS -->
      <div class="d-flex justify-content-between">

        <button class="btn btn-sm btn-warning"
                (click)="startEdit(a)">
          ✏️
        </button>

        <button class="btn btn-sm btn-danger"
                (click)="delete(a.id)">
          🗑️
        </button>

      </div>

    </div>

  </div>

</div>
